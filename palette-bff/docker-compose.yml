version: '3.8'

services:
  palette-bff:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=palette
      - DB_PASSWORD=palette
      - EIDP_CLIENT_ID=${EIDP_CLIENT_ID}
      - EIDP_CLIENT_SECRET=${EIDP_CLIENT_SECRET}
      - EIDP_ISSUER_URI=${EIDP_ISSUER_URI}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-}
      - PALETTE_ENV=${PALETTE_ENV:-UAT}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - palette-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - palette-network
    restart: unless-stopped

  postgres:
    image: docker.m.daocloud.io/postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=palette
      - POSTGRES_USER=palette
      - POSTGRES_PASSWORD=palette
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U palette"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - palette-network
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:

networks:
  palette-network:
    driver: bridge
