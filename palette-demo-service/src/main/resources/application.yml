# ─── Server ──────────────────────────────────────────────
server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: palette-demo-service

# ─── Database (H2 for demo) ─────────────────────────────
  datasource:
    url: jdbc:h2:mem:demodb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

# ─── JPA ─────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

# ─── Logging ─────────────────────────────────────────────
logging:
  level:
    com.company.palette.demo: DEBUG
    org.springframework.web: INFO
